<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>body{margin:0;padding:0;overflow:hidden;background:transparent;}</style>
</head>
<body>
<script>
  // Read ad parameters from URL query string
  var params = new URLSearchParams(window.location.search);
  var key = params.get('key');
  var width = parseInt(params.get('width') || '320', 10);
  var height = parseInt(params.get('height') || '50', 10);

  // Set the atOptions global that invoke.js reads
  atOptions = {
    'key': key,
    'format': 'iframe',
    'height': height,
    'width': width,
    'params': {}
  };

  // Load Adsterra's invoke.js — inside this iframe document,
  // document.write works on all platforms including iOS Safari
  var s = document.createElement('script');
  s.type = 'text/javascript';
  s.src = 'https://www.highperformanceformat.com/' + key + '/invoke.js';
  document.body.appendChild(s);
</script>
</body>
</html>
